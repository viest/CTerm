name: Build Release DMG

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build-release-dmg:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Fetch Git LFS assets
        run: git lfs pull

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Verify Zig toolchain
        run: zig version

      - name: Build release app bundle
        run: make app

      - name: Package DMG
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          bash ./scripts/create-dmg.sh --version "$TAG_NAME"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: CTerm-${{ github.ref_name }}-dmg
          path: build/CTerm-*.dmg
          if-no-files-found: error

      - name: Publish release asset
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          DMG_PATH="build/CTerm-${TAG_NAME#v}.dmg"

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$DMG_PATH" --clobber
          else
            gh release create "$TAG_NAME" "$DMG_PATH" --title "$TAG_NAME" --generate-notes
          fi
